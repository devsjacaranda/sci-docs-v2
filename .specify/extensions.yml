installed:
- agent-context
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  after_plan:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  after_implement:
  - extension: agent-context
    command: speckit.complete
    enabled: true
    optional: true
    prompt: Arquivar feature concluída com /speckit-complete?
    description: Archive completed feature (STATUS, feature.json, agent context)
    condition: null
